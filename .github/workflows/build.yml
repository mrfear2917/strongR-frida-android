name: build hluda-server

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Instalar Dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build flex bison xz-utils python3-pip
          pip3 install lief

      - name: Configurar NDK
        uses: nttld/setup-ndk@v1.0.6
        with:
          ndk-version: r25c

      - name: Clonar Frida 16.7.14
        run: |
          git clone --recurse-submodules --branch 16.7.14 https://github.com/frida/frida

      - name: Aplicar Parches Brutalmente
        run: |
          # Limpieza total de parches que ya vamos a inyectar manualmente
          rm -f Patchs/strongR-frida/frida-core/0002*.patch
          rm -f Patchs/strongR-frida/frida-core/0003*.patch

          cd frida/subprojects/frida-core
          
          # Aplicar los parches restantes usando 'patch' (ignora errores de historial)
          for patch in ../../../Patchs/strongR-frida/frida-core/*.patch; do
            echo "Aplicando $(basename "$patch") vía modo martillo..."
            patch -p1 --ignore-whitespace --forward < "$patch" || echo "⚠️ Aviso: Este parche falló parcialmente, continuando..."
          done
          cd ../../..

          # INYECCIONES MANUALES DE SEGURIDAD (UUID y PIPES)
          python3 -c "
          # UUID
          with open('frida/subprojects/frida-core/server/server.vala', 'r+') as f:
              c = f.read().replace('private const string DEFAULT_DIRECTORY = \"re.frida.server\";', 'private static string DEFAULT_DIRECTORY = null;')
              c = c.replace('private static int main (string[] args) {', 'private static int main (string[] args) { DEFAULT_DIRECTORY = GLib.Uuid.string_random();')
              f.seek(0); f.write(c); f.truncate()
          
          # PIPES
          glue = 'frida/subprojects/frida-core/src/linux/frida-helper-backend-glue.c'
          with open(glue, 'r+') as f:
              c = f.read().replace('\"%s/linjector-%u\"', '\"%s/%p%u\", self')
              f.seek(0); f.write(c); f.truncate()
          "

      - name: Compilar
        run: |
          cd frida
          make server-android-arm64
          make inject-android-arm64
          make gadget-android-arm64

      - name: Empaquetar y Publicar
        run: |
          mkdir -p releases_output
          cd frida/build/frida-android-arm64/bin
          gzip -9 frida-server frida-inject
          mv *.gz ../../../../../releases_output/
          # (Añadir resto de archivos igual que antes...)
